name: CI and packages

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  checks:
    name: Rust checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: Validate release tag
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: |
          VERSION="$(awk -F ' *= *' '/^version *=/ { gsub(/"/, "", $2); print $2; exit }' Cargo.toml)"
          if [[ "$GITHUB_REF_NAME" != "v$VERSION" ]]; then
            echo "Tag $GITHUB_REF_NAME does not match Cargo.toml version $VERSION" >&2
            exit 1
          fi
      - run: cargo fmt --all -- --check
      - run: cargo test --all-targets --all-features --locked
      - run: cargo clippy --all-targets --all-features --locked -- -D warnings

  windows:
    name: Windows EXE
    if: github.event_name != 'pull_request'
    needs: checks
    runs-on: windows-latest
    env:
      WINDOWS_CERTIFICATE_BASE64: ${{ secrets.WINDOWS_CERTIFICATE_BASE64 }}
      WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc
      - uses: Swatinem/rust-cache@v2
        with:
          key: windows-x86_64
      - name: Test Windows target
        run: cargo test --all-targets --all-features --locked
      - name: Build Windows package
        shell: pwsh
        run: |
          if ($env:WINDOWS_CERTIFICATE_BASE64) {
            $CertificatePath = Join-Path $env:RUNNER_TEMP "clip-it-signing.pfx"
            [IO.File]::WriteAllBytes(
              $CertificatePath,
              [Convert]::FromBase64String($env:WINDOWS_CERTIFICATE_BASE64)
            )
            $env:WINDOWS_CERTIFICATE_PATH = $CertificatePath
          }
          ./scripts/package-windows.ps1
      - uses: actions/upload-artifact@v4
        with:
          name: windows-x86_64
          path: |
            dist/*.exe
            dist/*.zip
            dist/*.sha256
          if-no-files-found: error

  macos:
    name: macOS universal DMG
    if: github.event_name != 'pull_request'
    needs: checks
    runs-on: macos-14
    env:
      MACOS_CERTIFICATE_BASE64: ${{ secrets.MACOS_CERTIFICATE_BASE64 }}
      MACOS_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
      MACOS_SIGN_IDENTITY: ${{ secrets.MACOS_SIGN_IDENTITY }}
      APPLE_ID: ${{ secrets.APPLE_ID }}
      APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin
      - uses: Swatinem/rust-cache@v2
        with:
          key: macos-universal
      - name: Test macOS target
        run: cargo test --all-targets --all-features --locked
      - name: Import Apple signing certificate
        if: env.MACOS_CERTIFICATE_BASE64 != ''
        shell: bash
        run: |
          CERTIFICATE_PATH="$RUNNER_TEMP/clip-it-signing.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/clip-it-signing.keychain-db"
          printf '%s' "$MACOS_CERTIFICATE_BASE64" | base64 --decode > "$CERTIFICATE_PATH"
          security create-keychain -p runner "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p runner "$KEYCHAIN_PATH"
          security import "$CERTIFICATE_PATH" -P "$MACOS_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -s -k runner "$KEYCHAIN_PATH"
      - name: Build universal DMG
        shell: bash
        run: |
          if [[ -z "$MACOS_SIGN_IDENTITY" ]]; then
            export MACOS_SIGN_IDENTITY="-"
          fi
          MACOS_TARGETS="aarch64-apple-darwin x86_64-apple-darwin" ./scripts/package-macos.sh
      - name: Notarize DMG
        if: env.APPLE_ID != '' && env.APPLE_APP_PASSWORD != '' && env.APPLE_TEAM_ID != '' && env.MACOS_SIGN_IDENTITY != ''
        shell: bash
        run: |
          DMG_PATH="$(find dist -maxdepth 1 -name '*.dmg' -print -quit)"
          xcrun notarytool submit "$DMG_PATH" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_APP_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait
          xcrun stapler staple "$DMG_PATH"
          shasum -a 256 "$DMG_PATH" > "$DMG_PATH.sha256"
      - uses: actions/upload-artifact@v4
        with:
          name: macos-universal
          path: |
            dist/*.dmg
            dist/*.zip
            dist/*.sha256
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [windows, macos]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true
      - name: Generate and sign update manifest
        shell: bash
        env:
          UPDATE_SIGNING_PRIVATE_KEY: ${{ secrets.UPDATE_SIGNING_PRIVATE_KEY }}
        run: |
          if [[ -z "$UPDATE_SIGNING_PRIVATE_KEY" ]]; then
            echo "UPDATE_SIGNING_PRIVATE_KEY is required for tagged releases" >&2
            exit 1
          fi
          python3 scripts/generate-update-manifest.py \
            --dist release-assets \
            --version "$GITHUB_REF_NAME" \
            --repository "$GITHUB_REPOSITORY" \
            --output release-assets/update-manifest.json
          SIGNING_DIR="$(mktemp -d)"
          trap 'rm -rf "$SIGNING_DIR"' EXIT
          umask 077
          printf '%s\n' "$UPDATE_SIGNING_PRIVATE_KEY" > "$SIGNING_DIR/private.pem"
          openssl pkeyutl -sign -rawin \
            -inkey "$SIGNING_DIR/private.pem" \
            -in release-assets/update-manifest.json \
            -out "$SIGNING_DIR/update-manifest.sig.bin"
          base64 -w 0 "$SIGNING_DIR/update-manifest.sig.bin" \
            > release-assets/update-manifest.sig
          printf '\n' >> release-assets/update-manifest.sig
      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: release-assets/*
