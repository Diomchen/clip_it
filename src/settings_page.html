@keyframes noiseShift{0%{transform:translate(0)}25%{transform:translate(3%,-2%)}50%{transform:translate(-2%,3%)}75%{transform:translate(1%,2%)}}@keyframes blink{0%,48%{opacity:1}49%,63%{opacity:.15}64%{opacity:1}}@keyframes brandGlitch{0%,91%,100%{transform:translate(0)}92%{transform:translate(-7px,2px)}94%{transform:translate(5px,-2px)}96%{transform:translate(-2px)}}@keyframes scan{from{transform:translateY(-110%)}to{transform:translateY(590%)}}@keyframes current{to{stroke-dashoffset:-30}}@keyframes shellScan{to{background-position:0 90px}}@keyframes chromatic{0%,87%,100%{transform:translate(-3px,2px)}88%{transform:translate(8px,-3px)}91%{transform:translate(-7px,4px)}94%{transform:translate(2px,-5px)}}

<body>
<div class="noise" aria-hidden="true"></div>
<main>
  <header class="hero"><div><h1 class="brand" data-text="CLIP//IT">CLIP//IT</h1><p>local signal relay · matter / code / matter</p></div><span class="live">LAN SIGNAL ACTIVE</span></header>
  <div class="layout">
    <section class="panel network">
      <div class="panel-head"><h2>Signal topology</h2><span class="count" id="count">SCANNING...</span></div>
      <div class="stage" id="stage">
        <div class="axis x"></div><div class="axis y"></div><span class="coordinate a">X:00 / Y:00</span><span class="coordinate b">NO CLOUD // LOCAL ONLY</span>
        <svg class="signal-layer" id="signalLayer" aria-hidden="true">
          <g id="linkLayer"></g><path class="drag-path" id="dragPath"></path><path class="signal-path" id="signalPath"></path>
        </svg>
        <div class="ascii-layer" id="asciiLayer" aria-hidden="true"></div>
        <button class="entity local" id="local" type="button" tabindex="-1" data-index="00"><span class="artifact-shell"></span><span class="entity-content"><span class="node-emoji">📋</span><strong>本机</strong><small>CORE / CLIPIT</small></span></button>
        <div class="empty" id="empty">WAITING FOR NEARBY SIGNALS</div>
      </div>
      <div class="hint"><span><strong>拖拽节点至核心</strong>：实体 → ASCII 电流 → 实体；向外拖动断开链路</span><span class="legend"><span><i></i>可连接</span><span><i class="linked"></i>已连接</span></span></div>
    </section>
    <aside class="panel settings">
      <h2>Node configuration</h2>
      <form class="form" method="get" action="/save">
        <input type="hidden" name="token" value="__TOKEN__">
        <div class="identity-grid">
          <label class="field">节点符号<input class="emoji-input" id="emojiInput" name="emoji" type="text" maxlength="24" value="__DEVICE_EMOJI__" aria-label="节点 Emoji" required></label>
          <label class="field">显示名称<input name="name" type="text" maxlength="48" value="__DEVICE_NAME__" autocomplete="off" required></label>
        </div>
        <div class="emoji-presets" aria-label="常用节点图标">
          <button class="emoji-preset" type="button" data-emoji="📋">📋</button><button class="emoji-preset" type="button" data-emoji="💻">💻</button><button class="emoji-preset" type="button" data-emoji="🖥️">🖥️</button><button class="emoji-preset" type="button" data-emoji="🍎">🍎</button><button class="emoji-preset" type="button" data-emoji="🚀">🚀</button><button class="emoji-preset" type="button" data-emoji="🐳">🐳</button><button class="emoji-preset" type="button" data-emoji="🏠">🏠</button><button class="emoji-preset" type="button" data-emoji="✨">✨</button>
        </div>
        <label class="field">传输端口<input name="port" type="number" min="1" max="65535" value="__PORT__" required></label>
        <label class="field">接收策略<select name="policy"><option value="confirm"__CONFIRM_SELECTED__>未知设备需要确认</option><option value="trusted-only"__TRUSTED_SELECTED__>仅可信设备</option><option value="accept-all"__ALL_SELECTED__>接受所有设备</option></select></label>
        <label class="switch"><input name="clipboard" type="checkbox" value="on"__CLIPBOARD_CHECKED__><span>自动同步文本、截图以及复制的文件和目录</span></label>
        <button class="save" type="submit">Commit configuration</button>
        <p class="note">链路关系保存 7 天，离线后再次上线会自动恢复。文件类型不受限制；符号链接和特殊设备文件除外。</p>
      </form>
    </aside>
  </div>
</main>
<div class="toast" id="toast"></div>
<script>
const token="__TOKEN__",stage=document.getElementById("stage"),local=document.getElementById("local"),empty=document.getElementById("empty"),count=document.getElementById("count"),toast=document.getElementById("toast"),emojiInput=document.getElementById("emojiInput"),linkLayer=document.getElementById("linkLayer"),dragPath=document.getElementById("dragPath"),signalPath=document.getElementById("signalPath"),asciiLayer=document.getElementById("asciiLayer");
const entities=new Map(),svgNS="http://www.w3.org/2000/svg",reduceMotion=matchMedia("(prefers-reduced-motion: reduce)").matches,glyphs="01#@%&+=<>/\\[]{}::CLIPIT";let snapshot=null,drag=null,toastTimer,transitioning=false;
function hash(value){let h=2166136261;for(const c of value){h^=c.charCodeAt(0);h=Math.imul(h,16777619)}return h>>>0}
function delay(ms){return new Promise(resolve=>setTimeout(resolve,ms))}
function positionFor(device,index){const rect=stage.getBoundingClientRect(),angle=((hash(device.id)%360)+index*47)*Math.PI/180;if(device.connected){const radius=Math.min(148,Math.max(112,rect.width*.19));return{x:rect.width/2+Math.cos(angle)*radius,y:rect.height/2+Math.sin(angle)*radius}}const rx=Math.max(142,rect.width*.41),ry=Math.max(126,rect.height*.39);return{x:rect.width/2+Math.cos(angle)*rx,y:rect.height/2+Math.sin(angle)*ry}}
function notify(message){toast.textContent=`> ${message}`;toast.classList.add("show");clearTimeout(toastTimer);toastTimer=setTimeout(()=>toast.classList.remove("show"),2400)}
async function action(kind,id){const response=await fetch(`/api/${kind}?token=${token}&id=${id}`,{cache:"no-store"});const data=await response.json();if(!response.ok)throw new Error(data.message||"操作失败");notify(data.message);return data}
function createEntity(device,index){const el=document.createElement("button");el.type="button";el.className="entity";el.dataset.id=device.id;el.dataset.index=String(index+1).padStart(2,"0");el.style.setProperty("--phase",`${-(hash(device.id)%5200)/1000}s`);el.innerHTML='<span class="artifact-shell"></span><span class="entity-content"><span class="node-emoji"></span><strong></strong><small></small></span>';el.addEventListener("pointerdown",startDrag);stage.appendChild(el);entities.set(device.id,el);return el}
function entityCenter(el,stageRect=stage.getBoundingClientRect()){const rect=el.getBoundingClientRect();return{x:rect.left-stageRect.left+rect.width/2,y:rect.top-stageRect.top+rect.height/2}}
function curvePath(from,to,bend=0){const dx=to.x-from.x,dy=to.y-from.y,length=Math.hypot(dx,dy)||1,nx=-dy/length,ny=dx/length,c1={x:from.x+dx*.34+nx*bend,y:from.y+dy*.34+ny*bend},c2={x:from.x+dx*.67-nx*bend*.45,y:from.y+dy*.67-ny*bend*.45};return`M ${from.x.toFixed(1)} ${from.y.toFixed(1)} C ${c1.x.toFixed(1)} ${c1.y.toFixed(1)},${c2.x.toFixed(1)} ${c2.y.toFixed(1)},${to.x.toFixed(1)} ${to.y.toFixed(1)}`}
function drawLinks(){linkLayer.replaceChildren();if(!snapshot)return;const core=entityCenter(local);snapshot.devices.forEach((device,index)=>{if(!device.connected)return;const el=entities.get(device.id);if(!el)return;const point=entityCenter(el),bend=((hash(device.id)%51)-25);for(const alt of [false,true]){const path=document.createElementNS(svgNS,"path");path.setAttribute("d",curvePath(point,core,bend+(alt?7:0)));path.setAttribute("class",`link-path${alt?" alt":""}`);path.setAttribute("id",`link-${index}-${alt?1:0}`);linkLayer.appendChild(path)}const text=document.createElementNS(svgNS,"text");text.setAttribute("class","link-glyph");const textPath=document.createElementNS(svgNS,"textPath");textPath.setAttribute("href",`#link-${index}-0`);textPath.setAttribute("startOffset","19%");textPath.textContent="01  ::  ASCII_LINK  ::  +++  ";text.appendChild(textPath);linkLayer.appendChild(text)})}
function resetDeformation(el){if(drag&&drag.el===el)return;el.classList.remove("pointer-reacting");el.style.setProperty("--pull-x","0px");el.style.setProperty("--pull-y","0px");el.style.setProperty("--sx","1");el.style.setProperty("--sy","1");el.style.setProperty("--turn","0deg")}
function render(highlightId=null){if(!snapshot)return;local.querySelector(".node-emoji").textContent=snapshot.local.emoji;local.querySelector("strong").textContent=snapshot.local.name;local.querySelector("small").textContent=`CORE / PORT_${snapshot.local.port}`;const active=new Set();let connected=0;snapshot.devices.forEach((device,index)=>{active.add(device.id);const el=entities.get(device.id)||createEntity(device,index);el.dataset.index=String(index+1).padStart(2,"0");el.querySelector(".node-emoji").textContent=device.emoji;el.querySelector("strong").textContent=device.name;el.querySelector("small").textContent=device.online?(device.connected?"LINK_STABLE":device.address):"SIGNAL_LOST";el.classList.toggle("connected",device.connected);el.classList.toggle("offline",!device.online);el.disabled=!device.online;if(device.connected)connected++;if(!drag||drag.el!==el){const point=positionFor(device,index);el.style.left=`${point.x}px`;el.style.top=`${point.y}px`}if(device.id===highlightId&&!reduceMotion){el.classList.add("materializing");setTimeout(()=>el.classList.remove("materializing"),680)}});for(const[id,el]of entities){if(!active.has(id)){el.remove();entities.delete(id)}}empty.style.opacity=snapshot.devices.length?0:1;count.textContent=`ONLINE_${snapshot.devices.filter(x=>x.online).length.toString().padStart(2,"0")} / LINKED_${connected.toString().padStart(2,"0")}`;requestAnimationFrame(()=>setTimeout(drawLinks,30))}
async function refresh(highlightId=null){try{const response=await fetch(`/api/devices?token=${token}`,{cache:"no-store"});snapshot=await response.json();render(highlightId)}catch(error){count.textContent="SIGNAL_INTERRUPTED"}}
function reactToPointer(event){if(drag||transitioning||reduceMotion)return;const rect=stage.getBoundingClientRect(),px=event.clientX-rect.left,py=event.clientY-rect.top;for(const el of [local,...entities.values()]){if(el.disabled)continue;const center=entityCenter(el,rect),dx=px-center.x,dy=py-center.y,distance=Math.hypot(dx,dy),radius=el===local?210:158;if(distance>=radius){resetDeformation(el);continue}const force=1-distance/radius,nx=dx/(distance||1),ny=dy/(distance||1),pull=force*(el===local?12:18),stretch=force*(el===local?.06:.13);el.classList.add("pointer-reacting");el.style.setProperty("--pull-x",`${(nx*pull).toFixed(2)}px`);el.style.setProperty("--pull-y",`${(ny*pull).toFixed(2)}px`);el.style.setProperty("--sx",(1+Math.abs(nx)*stretch-Math.abs(ny)*stretch*.3).toFixed(3));el.style.setProperty("--sy",(1+Math.abs(ny)*stretch-Math.abs(nx)*stretch*.3).toFixed(3));el.style.setProperty("--turn",`${(nx*ny*force*4).toFixed(2)}deg`)}}
function clearPointerReaction(){if(drag)return;for(const el of [local,...entities.values()])resetDeformation(el)}
function startDrag(event){const el=event.currentTarget;if(el.disabled||transitioning)return;event.preventDefault();const rect=stage.getBoundingClientRect(),center=entityCenter(el,rect),pointerX=event.clientX-rect.left,pointerY=event.clientY-rect.top;clearPointerReaction();drag={el,id:el.dataset.id,rect,anchor:center,current:{...center},target:{...center},grabX:center.x-pointerX,grabY:center.y-pointerY,frame:0};el.classList.remove("rebounding","pointer-reacting");el.classList.add("dragging");el.setPointerCapture(event.pointerId);window.addEventListener("pointermove",moveDrag);window.addEventListener("pointerup",endDrag,{once:true});window.addEventListener("pointercancel",endDrag,{once:true});moveDrag(event)}
function moveDrag(event){if(!drag)return;const margin=48,x=event.clientX-drag.rect.left+drag.grabX,y=event.clientY-drag.rect.top+drag.grabY;drag.target.x=Math.max(margin,Math.min(drag.rect.width-margin,x));drag.target.y=Math.max(margin,Math.min(drag.rect.height-margin,y));if(!drag.frame)drag.frame=requestAnimationFrame(animateDrag)}
function animateDrag(){if(!drag)return;drag.frame=0;const follow=reduceMotion?1:.29;drag.current.x+=(drag.target.x-drag.current.x)*follow;drag.current.y+=(drag.target.y-drag.current.y)*follow;const dx=drag.current.x-drag.anchor.x,dy=drag.current.y-drag.anchor.y,distance=Math.hypot(dx,dy),nx=dx/(distance||1),ny=dy/(distance||1),lag=Math.hypot(drag.target.x-drag.current.x,drag.target.y-drag.current.y),stretch=reduceMotion?0:Math.min(.24,distance*.0008+lag*.0035);drag.el.style.left=`${drag.current.x}px`;drag.el.style.top=`${drag.current.y}px`;drag.el.style.setProperty("--sx",(1+Math.abs(nx)*stretch-Math.abs(ny)*stretch*.24).toFixed(3));drag.el.style.setProperty("--sy",(1+Math.abs(ny)*stretch-Math.abs(nx)*stretch*.24).toFixed(3));drag.el.style.setProperty("--turn",`${(nx*ny*stretch*18).toFixed(2)}deg`);dragPath.setAttribute("d",curvePath(drag.anchor,drag.current,Math.sin(distance*.05)*9));stage.classList.toggle("drag-signal",distance>8);if(lag>.4)drag.frame=requestAnimationFrame(animateDrag)}
function hideDragSignal(){stage.classList.remove("drag-signal");dragPath.removeAttribute("d")}
function pulseAt(point){for(const kind of ["","magenta"]){const wave=document.createElement("i");wave.className=`signal-wave ${kind}`;wave.style.left=`${point.x}px`;wave.style.top=`${point.y}px`;stage.appendChild(wave);setTimeout(()=>wave.remove(),900)}}
function curvePoint(from,to,t,bend,jitter){const dx=to.x-from.x,dy=to.y-from.y,length=Math.hypot(dx,dy)||1,nx=-dy/length,ny=dx/length,ease=t*t*(3-2*t),arc=Math.sin(Math.PI*t)*bend,electric=(Math.sin(t*53+jitter)*5+Math.sin(t*17-jitter)*3)*Math.sin(Math.PI*t);return{x:from.x+dx*ease+nx*(arc+electric),y:from.y+dy*ease+ny*(arc+electric)}}
async function transmitAscii(from,to,seed){signalPath.setAttribute("d",curvePath(from,to,34));stage.classList.add("transmitting");pulseAt(from);if(reduceMotion){await delay(80);pulseAt(to);stage.classList.remove("transmitting");signalPath.removeAttribute("d");return}const animations=[];for(let i=0;i<58;i++){const char=document.createElement("span"),jitter=(hash(`${seed}-${i}`)%1000)/53,bend=((hash(`${i}-${seed}`)%55)-27);char.className="ascii-particle";char.textContent=glyphs[(hash(`${seed}:${i}`)%glyphs.length)];char.style.color=i%7===0?"var(--paper)":i%5===0?"var(--cyan)":"var(--acid)";asciiLayer.appendChild(char);const frames=[];for(let step=0;step<=7;step++){const t=step/7,point=curvePoint(from,to,t,bend,jitter);frames.push({transform:`translate(${point.x}px,${point.y}px) translate(-50%,-50%) scale(${.72+Math.sin(Math.PI*t)*.55})`,opacity:step===0||step===7?0:1,offset:t})}const animation=char.animate(frames,{duration:620+(i%9)*24,delay:i*11,easing:"steps(14,end)",fill:"forwards"});animations.push(animation.finished.catch(()=>{}).then(()=>char.remove()))}await Promise.all(animations);pulseAt(to);stage.classList.remove("transmitting");signalPath.removeAttribute("d")}
async function transformConnection(device,kind,index){if(transitioning)return;transitioning=true;const el=entities.get(device.id),rect=stage.getBoundingClientRect(),from=entityCenter(el,rect),to=kind==="connect"?entityCenter(local,rect):positionFor({...device,connected:false},index);el.classList.add("dematerializing");local.classList.add("receiving");const request=delay(260).then(()=>action(kind,device.id));try{await Promise.all([transmitAscii(from,to,`${device.id}-${kind}`),request]);await refresh();const rebuilt=entities.get(device.id);rebuilt.classList.remove("dematerializing");rebuilt.classList.add("materializing");setTimeout(()=>rebuilt.classList.remove("materializing"),700)}catch(error){el.classList.remove("dematerializing");notify(error.message);render()}finally{local.classList.remove("receiving");transitioning=false}}
async function endDrag(){if(!drag)return;const current=drag,device=snapshot.devices.find(x=>x.id===current.id),index=snapshot.devices.findIndex(x=>x.id===current.id);if(current.frame)cancelAnimationFrame(current.frame);current.el.classList.remove("dragging");current.el.classList.add("rebounding");window.removeEventListener("pointermove",moveDrag);window.removeEventListener("pointerup",endDrag);window.removeEventListener("pointercancel",endDrag);const core=entityCenter(local,current.rect),distance=Math.hypot(current.target.x-core.x,current.target.y-core.y);drag=null;hideDragSignal();resetDeformation(current.el);setTimeout(()=>current.el.classList.remove("rebounding"),760);if(device&&!device.connected&&distance<154)await transformConnection(device,"connect",index);else if(device&&device.connected&&distance>205)await transformConnection(device,"disconnect",index);else render()}
stage.addEventListener("pointermove",reactToPointer);stage.addEventListener("pointerleave",clearPointerReaction);document.querySelectorAll(".emoji-preset").forEach(button=>button.addEventListener("click",()=>{emojiInput.value=button.dataset.emoji;emojiInput.focus()}));
